name: Build and Release
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*' # Trigger on version tags, e.g. v1.0.0
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: win64
          - os: macos-latest
            artifact_name: maca64
          - os: ubuntu-latest
            artifact_name: linux64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Executable
        run: |
          python build_dist.py

      - name: Package Release
        shell: bash
        run: |
          # Create a clean directory for packaging
          PKG_DIR="EEGLAB-DAG"
          mkdir -p $PKG_DIR/bin
          mkdir -p $PKG_DIR/src
          
          # Copy only necessary files
          cp -r bin/${{ matrix.artifact_name }} $PKG_DIR/bin/
          cp -r library $PKG_DIR/
          cp -r tutorials $PKG_DIR/
          cp -r src/matlab $PKG_DIR/src/
          cp *.m $PKG_DIR/
          cp README.md $PKG_DIR/
          
          # Create ZIP
          # Using ref_name for versioning (e.g., v1.0.0 or main)
          ZIP_NAME="EEGLAB-DAG-${{ github.ref_name }}-${{ matrix.artifact_name }}.zip"
          zip -r $ZIP_NAME $PKG_DIR
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.artifact_name }}
          path: ${{ env.ZIP_NAME }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          pattern: zip-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*.zip
